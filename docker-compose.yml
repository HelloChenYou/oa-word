services:
  migrate:
    image: python:3.11-slim
    container_name: proofread-migrate
    command: sh -c "pip install -r requirements.txt && alembic upgrade head"
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      - postgres
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"print('ok')\""]
      interval: 30s
      timeout: 5s
      retries: 1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proofread-frontend
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    image: python:3.11-slim
    container_name: proofread-api
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: python:3.11-slim
    container_name: proofread-worker
    command: sh -c "pip install -r requirements.txt && rq worker proofread --url redis://redis:6379/0"
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from redis import Redis; Redis.from_url('redis://redis:6379/0').ping()\""]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: proofread-postgres
    command: ["postgres", "-c", "timezone=Asia/Shanghai", "-c", "log_timezone=Asia/Shanghai"]
    environment:
      POSTGRES_USER: proofread
      POSTGRES_PASSWORD: proofread
      POSTGRES_DB: proofread
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofread -d proofread"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: proofread-redis
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  pgdata:
