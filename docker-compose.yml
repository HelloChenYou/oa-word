services:
  migrate:
    image: python:3.11-slim
    container_name: proofread-migrate
    command: sh -c "pip install -r requirements.txt && alembic upgrade head"
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      - postgres
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proofread-frontend
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "5173:80"
    depends_on:
      - api

  api:
    image: python:3.11-slim
    container_name: proofread-api
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  worker:
    image: python:3.11-slim
    container_name: proofread-worker
    command: sh -c "pip install -r requirements.txt && rq worker proofread --url redis://redis:6379/0"
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: proofread-postgres
    command: ["postgres", "-c", "timezone=Asia/Shanghai", "-c", "log_timezone=Asia/Shanghai"]
    environment:
      POSTGRES_USER: proofread
      POSTGRES_PASSWORD: proofread
      POSTGRES_DB: proofread
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: proofread-redis
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6379:6379"


volumes:
  pgdata:
